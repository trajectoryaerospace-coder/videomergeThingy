<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal WhatsApp Video Merger</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --success-color: #10b981;
            --success-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h2 { margin-top: 0; font-size: 24px; font-weight: 600; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .upload-zone {
            border: 2px dashed var(--border-color);
            padding: 35px 20px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            position: relative;
        }

        .upload-zone:hover { border-color: var(--accent-color); }

        .upload-zone input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        .btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #mergeBtn { background-color: var(--accent-color); display: none; }
        #mergeBtn:hover { background-color: var(--accent-hover); }
        #mergeBtn:disabled { background-color: #475569; cursor: not-allowed; }
        
        #downloadBtn { background-color: var(--success-color); display: none; }
        #downloadBtn:hover { background-color: var(--success-hover); }

        #status { margin-top: 20px; font-size: 14px; color: var(--text-muted); line-height: 1.5; }
        .video-preview { margin-top: 30px; width: 100%; border-radius: 12px; border: 1px solid var(--border-color); background: #000; display: none; }
        
        .invisible-engine {
            position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h2>Universal MP4 Video Merger</h2>
        <p class="subtitle">Outputs fully seekable, WhatsApp-compatible MP4 files for any number of clips.</p>
        
        <div class="upload-zone">
            <span style="font-size: 40px; display:block; margin-bottom:10px;">🎬</span>
            <div id="upload-text">Click to choose 2+ MP4 files</div>
            <input type="file" id="videoInput" accept="video/mp4" multiple>
        </div>

        <button id="mergeBtn" class="btn">Merge Into WhatsApp MP4</button>
        <button id="downloadBtn" class="btn">⬇️ Download WhatsApp MP4</button>
        
        <div id="status">Waiting for files...</div>
        <video id="outputVideo" class="video-preview" controls></video>
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>

    <video id="hiddenPlayer" class="invisible-engine" muted playsinline crossorigin="anonymous"></video>
    <canvas id="hiddenCanvas" class="invisible-engine"></canvas>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js'
        });

        const videoInput = document.getElementById('videoInput');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const uploadText = document.getElementById('upload-text');
        const outputVideo = document.getElementById('outputVideo');
        
        const hiddenPlayer = document.getElementById('hiddenPlayer');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        let selectedFiles = [];
        let finalMp4Url = null;
        let isProcessing = false;
        let audioSourceNode = null;

        videoInput.addEventListener('change', () => {
            selectedFiles = Array.from(videoInput.files);
            if (selectedFiles.length >= 2) {
                uploadText.innerHTML = `<strong>${selectedFiles.length} videos queued</strong>`;
                status.innerText = "Ready to merge into an optimized WhatsApp configuration.";
                mergeBtn.style.display = "block";
                downloadBtn.style.display = "none";
                outputVideo.style.display = "none";
            } else {
                mergeBtn.style.display = "none";
                status.innerText = "Please select at least 2 files.";
            }
        });

        mergeBtn.addEventListener('click', async () => {
            mergeBtn.disabled = true;
            isProcessing = true;
            status.innerText = "Initializing recording engines... (Please click anywhere on page if prompted)";

            let recordedChunks = [];
            const targetW = 1280; // High-quality 720p base standard
            const targetH = 720;
            hiddenCanvas.width = targetW;
            hiddenCanvas.height = targetH;

            // Audio track setups
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            await audioContext.resume();
            
            const audioDestination = audioContext.createMediaStreamDestination();
            
            if (!audioSourceNode) {
                audioSourceNode = audioContext.createMediaElementSource(hiddenPlayer);
            }
            audioSourceNode.disconnect();
            audioSourceNode.connect(audioDestination);

            function renderFrame() {
                if (!isProcessing) return;
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, targetW, targetH);

                const vW = hiddenPlayer.videoWidth;
                const vH = hiddenPlayer.videoHeight;
                if (vW && vH) {
                    const ratio = Math.min(targetW / vW, targetH / vH);
                    const newW = vW * ratio;
                    const newH = vH * ratio;
                    ctx.drawImage(hiddenPlayer, (targetW - newW) / 2, (targetH - newH) / 2, newW, newH);
                }
                requestAnimationFrame(renderFrame);
            }

            const canvasStream = hiddenCanvas.captureStream(30);
            const combinedStream = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...audioDestination.stream.getAudioTracks()
            ]);

            const mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp8,opus' });
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.start(250);

            // Step 1: Sequential high-speed tape recording loop
            for (let i = 0; i < selectedFiles.length; i++) {
                status.innerText = `[Step 1/2] Copying video clip ${i + 1} of ${selectedFiles.length}...`;
                const fileUrl = URL.createObjectURL(selectedFiles[i]);
                hiddenPlayer.src = fileUrl;
                
                await new Promise((resolve) => {
                    hiddenPlayer.onloadeddata = () => {
                        hiddenPlayer.playbackRate = 2.5; // Balanced fast speed encoding
                        hiddenPlayer.volume = 1.0;
                        hiddenPlayer.play();
                        renderFrame();
                        resolve();
                    };
                });

                await new Promise((resolve) => {
                    hiddenPlayer.onended = () => {
                        URL.revokeObjectURL(fileUrl);
                        resolve();
                    };
                });
            }

            isProcessing = false;
            mediaRecorder.stop();
            
            mediaRecorder.onstop = async () => {
                status.innerText = "[Step 2/2] Remuxing stream into a seekable WhatsApp MP4...";
                
                const rawWebmBlob = new Blob(recordedChunks, { type: 'video/webm' });
                audioContext.close();

                try {
                    if (!ffmpeg.isLoaded()) {
                        await ffmpeg.load();
                    }

                    ffmpeg.FS('writeFile', 'temp.webm', await fetchFile(rawWebmBlob));

                    // Convert to native seekable H.264/AAC MP4 framework
                    await ffmpeg.run('-i', 'temp.webm', '-c:v', 'libx264', '-preset', 'ultrafast', '-c:a', 'aac', 'final.mp4');

                    const data = ffmpeg.FS('readFile', 'final.mp4');
                    const realMp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
                    
                    finalMp4Url = URL.createObjectURL(realMp4Blob);
                    outputVideo.src = finalMp4Url;
                    outputVideo.style.display = "block";
                    downloadBtn.style.display = "block";
                    
                    status.innerText = "Success! Generated a true seekable MP4. Ready for mobile and WhatsApp!";
                    
                    ffmpeg.FS('unlink', 'temp.webm');
                    ffmpeg.FS('unlink', 'final.mp4');
                } catch (err) {
                    console.error(err);
                    status.innerText = "The pipeline conversion failed. Try using fewer or shorter clips.";
                } finally {
                    mergeBtn.disabled = false;
                }
            };
        });

        downloadBtn.addEventListener('click', () => {
            if (!finalMp4Url) return;
            const a = document.createElement('a');
            a.href = finalMp4Url;
            a.download = 'whatsapp_ready_video.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
