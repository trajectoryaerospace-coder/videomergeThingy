<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP4 Merger for Zan Youtube </title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --success-color: #10b981;
            --success-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h2 { margin-top: 0; font-size: 24px; font-weight: 600; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .upload-zone {
            border: 2px dashed var(--border-color);
            padding: 35px 20px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            position: relative;
        }

        .upload-zone:hover { border-color: var(--accent-color); }

        .upload-zone input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        .btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #mergeBtn { background-color: var(--accent-color); display: none; }
        #mergeBtn:hover { background-color: var(--accent-hover); }
        #mergeBtn:disabled { background-color: #475569; cursor: not-allowed; }
        
        #downloadBtn { background-color: var(--success-color); display: none; }
        #downloadBtn:hover { background-color: var(--success-hover); }

        #status { margin-top: 20px; font-size: 14px; color: var(--text-muted); line-height: 1.5; }
        .video-preview { margin-top: 30px; width: 100%; border-radius: 12px; border: 1px solid var(--border-color); background: #000; display: none; }
        
        .invisible-engine {
            position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h2>TIkToks Merger for Zan's Youtube</h2>
        
        <div class="upload-zone">
            <span style="font-size: 40px; display:block; margin-bottom:10px;">🎬</span>
            <div id="upload-text">Click to choose 2+ MP4 files</div>
            <input type="file" id="videoInput" accept="video/mp4" multiple>
        </div>

        <button id="mergeBtn" class="btn">Stitch Into 1 Video</button>
        <button id="downloadBtn" class="btn">Click 3 dot to download</button>
        
        <div id="status">Waiting for files...</div>
        <video id="outputVideo" class="video-preview" controls></video>
    </div>

    <video id="hiddenPlayer" class="invisible-engine" playsinline crossorigin="anonymous"></video>
    <canvas id="hiddenCanvas" class="invisible-engine"></canvas>

    <script>
        const videoInput = document.getElementById('videoInput');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const uploadText = document.getElementById('upload-text');
        const outputVideo = document.getElementById('outputVideo');
        
        const hiddenPlayer = document.getElementById('hiddenPlayer');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        let selectedFiles = [];
        let finalMp4Url = null;
        let isProcessing = false;

        // Persistent audio routing components
        let audioCtx = null;
        let audioDest = null;
        let audioSource = null;

        videoInput.addEventListener('change', () => {
            selectedFiles = Array.from(videoInput.files);
            if (selectedFiles.length >= 2) {
                uploadText.innerHTML = `<strong>${selectedFiles.length} videos loaded</strong>`;
                status.innerText = "Ready to compile.";
                mergeBtn.style.display = "block";
                downloadBtn.style.display = "none";
                outputVideo.style.display = "none";
            } else {
                mergeBtn.style.display = "none";
                status.innerText = "Please select at least 2 files.";
            }
        });

        mergeBtn.addEventListener('click', async () => {
            mergeBtn.disabled = true;
            isProcessing = true;
            status.innerText = "Opening audio recording tracks...";

            try {
                let recordedChunks = [];
                const targetW = 1280; 
                const targetH = 720;
                hiddenCanvas.width = targetW;
                hiddenCanvas.height = targetH;

                // Fire up the digital soundcard graph
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioDest = audioCtx.createMediaStreamDestination();
                    audioSource = audioCtx.createMediaElementSource(hiddenPlayer);
                    // Reroute audio strictly to recorder stream (prevents double audio echo out of speakers)
                    audioSource.connect(audioDest);
                }
                
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                function renderFrame() {
                    if (!isProcessing) return;
                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, targetW, targetH);

                    const vW = hiddenPlayer.videoWidth;
                    const vH = hiddenPlayer.videoHeight;
                    if (vW && vH) {
                        const ratio = Math.min(targetW / vW, targetH / vH);
                        const newW = vW * ratio;
                        const newH = vH * ratio;
                        ctx.drawImage(hiddenPlayer, (targetW - newW) / 2, (targetH - newH) / 2, newW, newH);
                    }
                    requestAnimationFrame(renderFrame);
                }

                // Auto-detect container structures supported by the current device
                let optimalMimeType = 'video/mp4;codecs=avc1,mp4a.40.2';
                if (!MediaRecorder.isTypeSupported(optimalMimeType)) optimalMimeType = 'video/mp4';
                if (!MediaRecorder.isTypeSupported(optimalMimeType)) optimalMimeType = 'video/webm;codecs=vp8,opus';

                const canvasStream = hiddenCanvas.captureStream(30);
                const outputStream = new MediaStream([
                    ...canvasStream.getVideoTracks(),
                    ...audioDest.stream.getAudioTracks()
                ]);

                const mediaRecorder = new MediaRecorder(outputStream, { mimeType: optimalMimeType });
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.start(250);

                // Process files sequentially
                for (let i = 0; i < selectedFiles.length; i++) {
                    status.innerText = `Stitching clip ${i + 1} of ${selectedFiles.length}...`;
                    const fileUrl = URL.createObjectURL(selectedFiles[i]);
                    hiddenPlayer.src = fileUrl;
                    
                    await new Promise((resolve, reject) => {
                        hiddenPlayer.onloadeddata = () => {
                            hiddenPlayer.muted = false; // CRITICAL: Forces browser to keep audio processing alive
                            hiddenPlayer.volume = 1.0;
                            hiddenPlayer.playbackRate = 2.0; // Fast 2x processing
                            hiddenPlayer.play().catch(reject);
                            renderFrame();
                            resolve();
                        };
                        hiddenPlayer.onerror = () => reject(new Error("File loading failure."));
                    });

                    await new Promise((resolve) => {
                        hiddenPlayer.onended = () => {
                            URL.revokeObjectURL(fileUrl);
                            resolve();
                        };
                    });
                }

                status.innerText = "Finishing audio/video track index map...";
                isProcessing = false;
                mediaRecorder.stop();
                
                mediaRecorder.onstop = () => {
                    const finalBlob = new Blob(recordedChunks, { type: optimalMimeType });
                    finalMp4Url = URL.createObjectURL(finalBlob);
                    
                    outputVideo.src = finalMp4Url;
                    outputVideo.style.display = "block";
                    downloadBtn.style.display = "block";
                    
                    status.innerText = "Success! Your proper, seekable video file is ready with full audio.";
                    mergeBtn.disabled = false;
                };

            } catch (err) {
                console.error(err);
                status.innerText = `Execution halted: ${err.message}. Please refresh and try again.`;
                mergeBtn.disabled = false;
                isProcessing = false;
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!finalMp4Url) return;
            const a = document.createElement('a');
            a.href = finalMp4Url;
            const isWebm = optimalMimeType.includes('webm');
            a.download = isWebm ? 'merged_sequence.webm' : 'merged_sequence.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
